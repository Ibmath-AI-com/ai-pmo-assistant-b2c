name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches:
      - "main"
      - "f-dayyak"
      - "h-salah"
      - "m-kanaan"
      - "m-zag"

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: |
          if npm run | grep -q " test"; then
            npm run test
          else
            echo "No frontend test script, skipping"
          fi

      - name: Build
        run: npm run build

  backend:
    name: Backend (${{ matrix.service }})
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - chat-service
          - persona-service
          - knowledge-service
          - template-service
          - admin-service
          - gateway
          - ai-orchestrator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            services/${{ matrix.service }}/requirements.txt
            services/shared/**/*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r services/${{ matrix.service }}/requirements.txt
          if [ -f services/shared/requirements.txt ]; then pip install -r services/shared/requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres -d test_db; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres..."
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://appuser:change_this_password@15.135.254.123:5432/pmodb
          POSTGRES_HOST: 15.135.254.123
          POSTGRES_PORT: 5432
          POSTGRES_DB: pmodb
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: change_this_password
        run: |
          TEST_DIR="services/${{ matrix.service }}/tests"
          if [ -d "$TEST_DIR" ] && find "$TEST_DIR" -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest "$TEST_DIR"
          else
            echo "No test files for ${{ matrix.service }}, skipping"
          fi