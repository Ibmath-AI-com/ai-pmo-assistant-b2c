name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches:
      - "main"
      - "f-dayyak"
      - "h-salah"
      - "m-kanaan"
      - "m-zag"

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test -- --runInBand
        continue-on-error: false

      - name: Build
        run: npm run build

  backend:
    name: Backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - chat-service
          - persona-service
          - knowledge-service
          - template-service
          - admin-service
          - gateway
          - ai-orchestrator

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            services/${{ matrix.service }}/requirements.txt
            services/shared/**/*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r services/${{ matrix.service }}/requirements.txt
          if [ -f services/shared/requirements.txt ]; then pip install -r services/shared/requirements.txt; fi
          pip install pytest

      - name: Run tests
        run: |
          if [ -d services/${{ matrix.service }}/tests ]; then
            pytest services/${{ matrix.service }}/tests
          else
            echo "No tests directory for ${{ matrix.service }}, skipping"
          fi